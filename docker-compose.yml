services:

  app:
    build: ./backend
    ports:
      - "8080:80"
    depends_on:
      - mariadb
      - mongodb
    volumes:
      - ./backend:/var/www/html

  mariadb:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: watchfolio
      MYSQL_USER: watchfolio_user
      MYSQL_PASSWORD: watchfolio_pass
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mariadb_data:
  mongodb_data: