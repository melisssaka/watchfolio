services:
  app:
    build: ./backend
    ports:
      - "8080:80"
    depends_on:
      - mariadb
      - mongodb
    volumes:
      - app_vendor:/var/www/html/vendor
  mariadb:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: watchfolio
      MYSQL_USER: watchfolio_user
      MYSQL_PASSWORD: watchfolio_pass
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
  mongodb:
    image: mongo:7
    volumes:
      - mongodb_data:/data/db
volumes:
  mariadb_data:
  mongodb_data:
  app_vendor: